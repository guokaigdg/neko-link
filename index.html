<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NekoLink — 原生 macOS 代理客户端</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <!-- 背景光束 -->
        <div class="beam beam-left"></div>
        <div class="beam beam-right"></div>

        <!-- 主内容区 -->
        <main class="hero">
            <!-- 标签 -->
            <div class="badge" data-animate>
                <span class="badge-dot"></span>
                <span>Mihomo 内核驱动</span>
            </div>

            <!-- 主标题 -->
            <h1 class="title" data-animate>
                <span class="title-line">极速代理引擎</span>
                <span class="title-line">原生 macOS 体验</span>
            </h1>

            <!-- 副标题 -->
            <p class="subtitle" data-animate>
                SwiftUI 原生架构 · 智能订阅解析 · 系统级代理<br />
                毫秒级延迟响应，全程透明加密传输。
            </p>

            <!-- 按钮组 -->
            <div class="cta-group" data-animate>
                <a href="#download" class="btn btn-primary">
                    <span>免费下载</span>
                    <svg
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                </a>
                <a href="https://github.com/guokaigdg/NekoLink" target="_blank" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
                        />
                    </svg>
                    <span>GitHub</span>
                </a>
            </div>

            <!-- 系统要求 -->
            <div class="system-note" data-animate>
                <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                </svg>
                <span>macOS 14+ &nbsp;·&nbsp; Universal 架构</span>
            </div>

            <!-- 产品 Mockup（3D Tilt） -->
            <div class="mockup-wrapper" data-animate data-tilt>
                <div class="mockup">
                    <div class="mockup-header">
                        <div class="mockup-dots"><span></span><span></span><span></span></div>
                        <div class="mockup-title">NekoLink</div>
                    </div>
                    <div class="mockup-body">
                        <div class="mockup-sidebar">
                            <div class="mockup-nav active">
                                <svg
                                    width="14"
                                    height="14"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                    <polyline points="14 2 14 8 20 8" />
                                </svg>
                                <span>订阅</span>
                            </div>
                            <div class="mockup-nav">
                                <svg
                                    width="14"
                                    height="14"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <circle cx="12" cy="12" r="10" />
                                    <line x1="2" y1="12" x2="22" y2="12" />
                                    <path
                                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
                                    />
                                </svg>
                                <span>连接</span>
                            </div>
                            <div class="mockup-nav">
                                <svg
                                    width="14"
                                    height="14"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                    <polyline points="14 2 14 8 20 8" />
                                </svg>
                                <span>日志</span>
                            </div>
                        </div>
                        <div class="mockup-content">
                            <div class="mockup-card">
                                <div class="mockup-card-header">
                                    <div class="mockup-status"></div>
                                    <span>运行中</span>
                                </div>
                                <div class="mockup-chart">
                                    <svg viewBox="0 0 300 80" preserveAspectRatio="none">
                                        <defs>
                                            <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4" />
                                                <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
                                            </linearGradient>
                                        </defs>
                                        <path
                                            d="M0,60 Q30,55 60,50 T120,45 T180,35 T240,40 T300,30"
                                            fill="none"
                                            stroke="#3b82f6"
                                            stroke-width="2"
                                        />
                                        <path
                                            d="M0,60 Q30,55 60,50 T120,45 T180,35 T240,40 T300,30 V80 H0 Z"
                                            fill="url(#chartGrad)"
                                        />
                                    </svg>
                                </div>
                                <div class="mockup-stats">
                                    <div>
                                        <span class="mockup-label">下载</span>
                                        <span class="mockup-value">12.4 MB/s</span>
                                    </div>
                                    <div>
                                        <span class="mockup-label">上传</span>
                                        <span class="mockup-value">2.1 MB/s</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 反射/阴影 -->
                <div class="mockup-shadow"></div>
            </div>
        </main>

        <script src="script.js"></script>
    </body>
</html>
